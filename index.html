<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>C.O.R.T.A.N.A — FGA</title>
<link rel="stylesheet" href="/galaxy.css" />
<style>
  :root {
    --arc: #35ff9d;
    --arc-dim: rgba(53, 255, 157, 0.35);
    --gold: #ffc42e;
    --red: #4bffa8;
    --bg: #030a06;
    --panel: rgba(6, 24, 15, 0.82);
    --line: rgba(53, 255, 157, 0.25);
    --ink: #d8ffe9;
    --muted: #5f9c7a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); overflow: hidden;
    font-family: "Avenir Next", "Helvetica Neue", -apple-system, sans-serif;
  }
  #orbCanvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 2; pointer-events: none; }

  /* ===== Hologram projector rig ===== */
  #scanlines {
    position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: .5;
    background: repeating-linear-gradient(to bottom,
      rgba(53,255,157,0.028) 0px, rgba(53,255,157,0.028) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: screen;
  }
  #scanlines::after {
    content: ""; position: absolute; left: 0; right: 0; height: 90px;
    background: linear-gradient(to bottom, transparent, rgba(53,255,157,0.06), transparent);
    animation: scanmove 7s linear infinite;
  }
  @keyframes scanmove { from { top: -12%; } to { top: 112%; } }

  #beam {
    position: fixed; left: 50%; bottom: 104px; transform: translateX(-50%);
    width: min(46vmin, 420px); height: 46vh; z-index: 1; pointer-events: none;
    background: linear-gradient(to top, rgba(53,255,157,0.18), rgba(53,255,157,0.055) 55%, transparent 92%);
    clip-path: polygon(43% 100%, 57% 100%, 100% 0%, 0% 0%);
    filter: blur(1px);
    animation: beamflicker 4.6s infinite;
  }
  #projBase {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%);
    width: 130px; height: 14px; border-radius: 50%; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255,232,170,0.9), rgba(53,255,157,0.35) 45%, transparent 70%);
    box-shadow: 0 0 24px rgba(53,255,157,0.5), 0 0 70px rgba(53,255,157,0.25);
    animation: beamflicker 4.6s infinite;
  }
  @keyframes beamflicker {
    0%, 100% { opacity: .95; }
    7% { opacity: .78; } 9% { opacity: 1; }
    36% { opacity: .86; }
    54% { opacity: .98; } 55% { opacity: .55; } 57% { opacity: .95; }
    78% { opacity: .88; }
  }
  @keyframes holoflicker {
    0%, 100% { opacity: var(--op, .5); }
    41% { opacity: calc(var(--op, .5) * .72); } 42.5% { opacity: var(--op, .5); }
    73% { opacity: calc(var(--op, .5) * .86); } 74.5% { opacity: var(--op, .5); }
  }

  /* ===== Floating vault files (background holograms) ===== */
  #holoField { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .holoCard {
    position: absolute; overflow: hidden; pointer-events: auto; cursor: pointer;
    padding: 10px 12px; border: 1px solid rgba(53,255,157,0.18); border-radius: 4px;
    background: linear-gradient(180deg, rgba(6,20,14,0.55), rgba(6,20,14,0.25));
    color: rgba(170,255,205,0.85); backdrop-filter: blur(2px);
    box-shadow: 0 0 18px rgba(53,255,157,0.06), inset 0 0 24px rgba(53,255,157,0.04);
    animation: holodrift var(--dur, 14s) ease-in-out infinite alternate, holoflicker 9s infinite;
  }
  .holoCard::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent 0 2px, rgba(53,255,157,0.035) 2px 3px);
  }
  .holoCard:hover {
    border-color: var(--arc); color: var(--ink); z-index: 6;
    box-shadow: 0 0 22px var(--arc-dim); --op: 1;
  }
  .holoCard .hname {
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--arc);
    margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .holoCard .hbody {
    font-size: 9.5px; line-height: 1.55; font-family: "SF Mono", Menlo, monospace;
    white-space: pre-wrap; word-break: break-word; max-height: 66px; overflow: hidden;
  }
  @keyframes holodrift {
    from { transform: translateY(0) rotate(0deg); }
    to   { transform: translateY(var(--y1, -16px)) rotate(var(--r1, .5deg)); }
  }

  /* ===== Priority ops dock ===== */
  #opsToggle {
    position: fixed; top: 60px; right: 16px; z-index: 40;
    background: var(--panel); border: 1px solid var(--line); color: var(--arc);
    font-size: 10px; letter-spacing: 0.25em; padding: 8px 14px; cursor: pointer;
    text-transform: uppercase; border-radius: 3px; backdrop-filter: blur(8px);
  }
  #opsToggle:hover { border-color: var(--arc); box-shadow: 0 0 14px var(--arc-dim); }
  #opsDock {
    position: fixed; top: 100px; right: 16px; z-index: 40; width: 200px;
    display: none; flex-direction: column; gap: 6px;
  }
  #opsDock.open { display: flex; }
  #opsDock .ohead { font-size: 9px; letter-spacing: .3em; color: var(--muted); text-transform: uppercase; padding: 0 2px 2px; }
  .opsBtn {
    display: flex; align-items: center; gap: 8px; font-family: inherit;
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    border-radius: 3px; padding: 8px 10px; cursor: pointer; backdrop-filter: blur(8px);
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase; text-align: left;
  }
  .opsBtn:hover { border-color: var(--arc); box-shadow: 0 0 12px var(--arc-dim); }
  .opsBtn .num { font-size: 9px; color: var(--gold); letter-spacing: .1em; width: 17px; flex-shrink: 0; }
  .opsBtn .olabel { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .opsBtn .ext { color: var(--muted); font-size: 12px; padding: 2px 5px; border-radius: 2px; }
  .opsBtn .ext:hover { color: var(--arc); text-shadow: 0 0 8px var(--arc-dim); }

  /* Node tooltip — shown when hovering a data point inside the orb */
  #nodeTip {
    position: fixed; z-index: 60; pointer-events: none; display: none;
    background: var(--panel); border: 1px solid var(--line); border-radius: 3px;
    padding: 5px 10px; font-size: 10.5px; letter-spacing: 0.08em; color: var(--arc);
    text-shadow: 0 0 8px var(--arc-dim); backdrop-filter: blur(8px); white-space: nowrap;
  }
  #nodeTip .ntype { color: var(--muted); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; margin-right: 8px; }
  #nodeTip.dir { color: var(--gold); text-shadow: 0 0 8px rgba(255,196,46,.4); }

  /* ===== Halo skybox — starfield + the Ring ===== */
  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .8;
    background-image:
      radial-gradient(1px 1px at 12% 22%, rgba(214,255,232,.9), transparent 55%),
      radial-gradient(1px 1px at 28% 8%, rgba(255,196,46,.75), transparent 55%),
      radial-gradient(1.5px 1.5px at 41% 31%, rgba(214,255,232,.7), transparent 55%),
      radial-gradient(1px 1px at 57% 12%, rgba(140,255,200,.8), transparent 55%),
      radial-gradient(1px 1px at 66% 27%, rgba(214,255,232,.6), transparent 55%),
      radial-gradient(1.5px 1.5px at 78% 6%, rgba(255,196,46,.6), transparent 55%),
      radial-gradient(1px 1px at 88% 19%, rgba(214,255,232,.85), transparent 55%),
      radial-gradient(1px 1px at 8% 55%, rgba(140,255,200,.5), transparent 55%),
      radial-gradient(1px 1px at 94% 47%, rgba(214,255,232,.55), transparent 55%),
      radial-gradient(1.5px 1.5px at 49% 4%, rgba(214,255,232,.9), transparent 55%),
      radial-gradient(1px 1px at 19% 38%, rgba(255,196,46,.45), transparent 55%),
      radial-gradient(1px 1px at 72% 41%, rgba(140,255,200,.5), transparent 55%);
    animation: starpulse 9s ease-in-out infinite alternate;
  }
  @keyframes starpulse { from { opacity: .55; } to { opacity: .95; } }
  #haloRing {
    position: fixed; left: 50%; top: -134vmax; transform: translateX(-50%) rotate(-8deg);
    width: 160vmax; height: 160vmax; z-index: 0; pointer-events: none;
    border-radius: 50%;
    border: 1.6vmax solid rgba(53,255,157,.14);
    box-shadow:
      0 0 5vmax rgba(53,255,157,.18),
      inset 0 0 4vmax rgba(53,255,157,.14),
      0 0 14vmax rgba(53,255,157,.08);
  }
  #haloRing::before { /* lit inner band — the Ring's habitable surface */
    content: ""; position: absolute; inset: .35vmax; border-radius: 50%;
    border: .28vmax solid rgba(255,196,46,.32);
    filter: blur(.6px);
  }
  #haloRing::after { /* faint atmosphere haze hugging the arc */
    content: ""; position: absolute; inset: -2.2vmax; border-radius: 50%;
    border: 2.2vmax solid rgba(140,255,200,.05);
    filter: blur(6px);
  }
  @media (max-width: 720px) { #haloRing { top: -140vmax; } }

  /* Subtle HUD grid */
  #hudGrid {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.35;
    background-image:
      linear-gradient(rgba(53,255,157,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(53,255,157,0.045) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at 50% 40%, transparent 25%, black 85%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 40%, transparent 25%, black 85%);
  }

  /* Header */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; pointer-events: none;
  }
  header .brand { display: flex; align-items: baseline; gap: 12px; }
  header h1 {
    margin: 0; font-size: 17px; font-weight: 600; letter-spacing: 0.55em;
    color: var(--arc); text-shadow: 0 0 18px var(--arc-dim);
  }
  header .sub { font-size: 10px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; }
  #clock { font-size: 12px; letter-spacing: 0.2em; color: var(--muted); font-variant-numeric: tabular-nums; }

  #orbStatus {
    position: fixed; top: 56%; left: 50%; transform: translateX(-50%); z-index: 5;
    font-size: 11px; letter-spacing: 0.45em; text-transform: uppercase; color: var(--arc);
    text-shadow: 0 0 12px var(--arc-dim); pointer-events: none; transition: color .4s;
    padding-left: 0.45em; /* balance letter-spacing */
  }
  #orbStatus.thinking { color: var(--gold); text-shadow: 0 0 12px rgba(255,196,46,.4); }
  #orbStatus.speaking { color: var(--red); text-shadow: 0 0 12px rgba(75,255,168,.4); }

  /* Vault drawer */
  #vaultToggle {
    position: fixed; top: 60px; left: 16px; z-index: 40;
    background: var(--panel); border: 1px solid var(--line); color: var(--arc);
    font-size: 10px; letter-spacing: 0.25em; padding: 8px 14px; cursor: pointer;
    text-transform: uppercase; border-radius: 3px; backdrop-filter: blur(8px);
  }
  #vaultToggle:hover { border-color: var(--arc); box-shadow: 0 0 14px var(--arc-dim); }
  #vault {
    position: fixed; top: 100px; left: 16px; bottom: 130px; width: 300px; z-index: 35;
    background: var(--panel); border: 1px solid var(--line); border-radius: 4px;
    backdrop-filter: blur(10px); display: none; flex-direction: column;
  }
  #vault.open { display: flex; }
  #vault .vhead {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    font-size: 10px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase;
  }
  #vaultTree { flex: 1; overflow-y: auto; padding: 8px 6px; font-size: 12.5px; }
  #vaultTree::-webkit-scrollbar, #log::-webkit-scrollbar, #fileBody::-webkit-scrollbar { width: 4px; }
  #vaultTree::-webkit-scrollbar-thumb, #log::-webkit-scrollbar-thumb, #fileBody::-webkit-scrollbar-thumb { background: var(--line); }
  .tnode { user-select: none; }
  .trow {
    display: flex; align-items: center; gap: 6px; padding: 3px 8px; cursor: pointer;
    border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .trow:hover { background: rgba(53,255,157,0.08); }
  .trow .glyph { color: var(--muted); font-size: 10px; width: 12px; flex-shrink: 0; }
  .trow.dir { color: #ffcf8a; }
  .trow.file { color: var(--ink); }
  .tchildren { margin-left: 14px; border-left: 1px solid rgba(53,255,157,0.1); display: none; }
  .tnode.open > .tchildren { display: block; }

  /* File preview */
  #filePreview {
    position: fixed; top: 100px; left: 330px; bottom: 130px; width: min(520px, calc(100vw - 350px));
    z-index: 36; background: var(--panel); border: 1px solid var(--line); border-radius: 4px;
    backdrop-filter: blur(10px); display: none; flex-direction: column;
  }
  #filePreview.open { display: flex; }
  #filePreview .fhead {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 10px 14px; border-bottom: 1px solid var(--line);
  }
  #filePreview .fname { font-size: 12px; color: var(--arc); letter-spacing: 0.05em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #fileBody { flex: 1; overflow-y: auto; padding: 14px; font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; font-family: "SF Mono", Menlo, monospace; color: #bdf5d4; }
  .fbtn {
    background: transparent; border: 1px solid var(--line); color: var(--arc); cursor: pointer;
    font-size: 10px; letter-spacing: 0.15em; padding: 5px 10px; border-radius: 3px; text-transform: uppercase; flex-shrink: 0;
  }
  .fbtn:hover { border-color: var(--arc); box-shadow: 0 0 10px var(--arc-dim); }
  .fbtn.gold { color: var(--gold); border-color: rgba(255,196,46,0.35); }
  .fbtn.gold:hover { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,196,46,0.3); }

  /* Chat */
  #chatWrap {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 0; z-index: 30;
    width: min(760px, 94vw); display: flex; flex-direction: column; gap: 8px; padding-bottom: 16px;
  }
  #log {
    max-height: 34vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
    padding: 4px; mask-image: linear-gradient(transparent, black 12%);
    -webkit-mask-image: linear-gradient(transparent, black 12%);
  }
  .msg {
    max-width: 82%; padding: 9px 14px; border-radius: 4px; font-size: 14px; line-height: 1.5;
    white-space: pre-wrap; backdrop-filter: blur(8px);
  }
  .msg.thomas { align-self: flex-end; background: rgba(53,255,157,0.12); border: 1px solid var(--line); color: #eafff3; }
  .msg.jarvis { align-self: flex-start; background: rgba(6,20,14,0.85); border: 1px solid rgba(255,196,46,0.25); color: var(--ink); }
  .msg.system { align-self: center; background: none; color: var(--muted); font-size: 12px; }

  #contextChips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px; font-size: 11px;
    background: rgba(255,196,46,0.1); border: 1px solid rgba(255,196,46,0.35); color: var(--gold);
    padding: 3px 8px; border-radius: 3px; cursor: pointer;
  }
  .chip:hover { border-color: var(--gold); }
  .chip .x { opacity: 0.7; }

  #bar {
    display: flex; gap: 8px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 4px; padding: 8px; backdrop-filter: blur(10px);
  }
  #input {
    flex: 1; background: transparent; border: none; outline: none; color: var(--ink);
    font-size: 15px; font-family: inherit; resize: none; padding: 8px 6px; max-height: 120px;
  }
  #input::placeholder { color: var(--muted); letter-spacing: 0.05em; }
  .barbtn {
    background: transparent; border: 1px solid var(--line); color: var(--arc); cursor: pointer;
    border-radius: 3px; padding: 0 14px; font-size: 13px; letter-spacing: 0.1em;
  }
  .barbtn:hover:not(:disabled) { border-color: var(--arc); box-shadow: 0 0 12px var(--arc-dim); }
  .barbtn:disabled { opacity: 0.4; cursor: default; }
  #mic.listening { color: var(--red); border-color: var(--red); animation: micpulse 1.1s infinite; }
  @keyframes micpulse { 0%,100% { box-shadow: 0 0 4px rgba(75,255,168,.4); } 50% { box-shadow: 0 0 16px rgba(75,255,168,.7); } }
  #tts.off { color: var(--muted); }

  /* ===== Model switchboard ===== */
  #switchRow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 0 2px; }
  #modelPills, #effortPills { display: contents; }
  .swLabel { font-size: 9px; letter-spacing: .28em; color: var(--muted); text-transform: uppercase; }
  .mpill, .epill {
    font-family: inherit; background: var(--panel); border: 1px solid var(--line); color: var(--muted);
    border-radius: 3px; padding: 4px 9px; font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
    cursor: pointer; backdrop-filter: blur(8px); transition: color .15s, border-color .15s, box-shadow .15s;
  }
  .mpill:hover:not(:disabled), .epill:hover:not(:disabled) { border-color: var(--arc); color: var(--ink); }
  .mpill.sel { color: var(--arc); border-color: var(--arc); box-shadow: 0 0 10px var(--arc-dim); text-shadow: 0 0 8px var(--arc-dim); }
  .mpill.sel.auto { color: var(--gold); border-color: rgba(255,196,46,.6); box-shadow: 0 0 10px rgba(255,196,46,.25); text-shadow: 0 0 8px rgba(255,196,46,.35); }
  .epill.sel { color: var(--gold); border-color: rgba(255,196,46,.6); box-shadow: 0 0 10px rgba(255,196,46,.25); }
  .mpill:disabled { opacity: .3; cursor: default; text-decoration: line-through; }
  #switchRow .divider { width: 1px; height: 16px; background: var(--line); margin: 0 4px; }

  /* Routing badge on Jarvis replies */
  .routeTag {
    display: block; font-size: 9px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--gold); opacity: .8; margin-bottom: 5px;
  }
  .routeTag .rr { color: var(--muted); letter-spacing: .06em; text-transform: none; }

  /* ===== Systems panel (capabilities + dos/don'ts) ===== */
  #sysToggle {
    position: fixed; top: 60px; left: 110px; z-index: 40;
    background: var(--panel); border: 1px solid var(--line); color: var(--gold);
    font-size: 10px; letter-spacing: 0.25em; padding: 8px 14px; cursor: pointer;
    text-transform: uppercase; border-radius: 3px; backdrop-filter: blur(8px);
  }
  #sysToggle:hover { border-color: var(--gold); box-shadow: 0 0 14px rgba(255,196,46,.25); }
  #sysPanel {
    position: fixed; top: 100px; left: 16px; bottom: 130px; width: 350px; z-index: 37;
    background: var(--panel); border: 1px solid var(--line); border-radius: 4px;
    backdrop-filter: blur(10px); display: none; flex-direction: column;
  }
  #sysPanel.open { display: flex; }
  #sysPanel .vhead {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    font-size: 10px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase;
  }
  #sysBody { flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 11.5px; line-height: 1.55; }
  #sysBody::-webkit-scrollbar { width: 4px; }
  #sysBody::-webkit-scrollbar-thumb { background: var(--line); }
  .sysH { font-size: 9px; letter-spacing: .3em; color: var(--gold); text-transform: uppercase; margin: 16px 0 6px; }
  .sysH:first-child { margin-top: 0; }
  .sysRow { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(53,255,157,.08); align-items: baseline; }
  .sysRow .dot { flex-shrink: 0; font-size: 9px; }
  .sysRow .dot.on { color: #7dff9a; text-shadow: 0 0 6px rgba(125,255,154,.5); }
  .sysRow .dot.off { color: var(--red); }
  .sysRow .sname { color: var(--ink); font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; flex-shrink: 0; min-width: 92px; }
  .sysRow .sdesc { color: var(--muted); font-size: 10.5px; }
  .sysList { margin: 0; padding-left: 16px; color: var(--muted); font-size: 10.5px; }
  .sysList li { margin: 4px 0; }
  .sysList li b { color: var(--ink); font-weight: 600; }

  @media (max-width: 720px) {
    #vault { width: 78vw; }
    #sysPanel { width: 86vw; }
    #sysToggle { left: 96px; }
    #switchRow .swLabel { display: none; }
    #filePreview { left: 8px; right: 8px; width: auto; }
    header h1 { letter-spacing: 0.3em; font-size: 14px; }
    #holoField { display: none; }
    #opsDock { width: 160px; right: 8px; }
    #opsToggle { right: 8px; }
    #beam { width: 60vmin; }
  }
</style>
</head>
<body>
<div id="stars"></div>
<div id="haloRing"></div>
<div id="holoField"></div>
<div id="beam"></div>
<div id="projBase"></div>
<canvas id="orbCanvas"></canvas>
<div id="hudGrid"></div>
<div id="scanlines"></div>

<header>
  <div class="brand">
    <h1>C.O.R.T.A.N.A</h1>
    <span class="sub">UNSC AI CTN 0452-9 — Forever Gold AI</span>
  </div>
  <div id="clock"></div>
</header>

<div id="orbStatus">Online</div>
<div id="nodeTip"></div>

<button id="vaultToggle">◈ Vault</button>
<button id="sysToggle">◈ Sys</button>
<button id="opsToggle">◈ Ops</button>
<div id="sysPanel">
  <div class="vhead">Systems — Capabilities &amp; Switchboard</div>
  <div id="sysBody"><div class="msg system">Loading…</div></div>
</div>
<div id="opsDock"><div class="ohead">Priority Ops</div></div>
<div id="vault">
  <div class="vhead">FGA-Brain — Obsidian Vault</div>
  <div id="vaultTree"><div class="msg system">Loading vault…</div></div>
</div>

<div id="filePreview">
  <div class="fhead">
    <span class="fname" id="fileName"></span>
    <button class="fbtn gold" id="fileAttach">+ Context</button>
    <button class="fbtn" id="fileClose">✕</button>
  </div>

<script>
/* Static display mode — on GitHub Pages there is no local core (server.js).
   Intercept /api/* so the UI degrades cleanly instead of surfacing 404s. */
(function () {
  const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
  if (isLocal) return;
  const realFetch = window.fetch.bind(window);
  window.fetch = function (url, opts) {
    const u = typeof url === 'string' ? url : (url && url.url) || '';
    if (!u.startsWith('/api/')) return realFetch(url, opts);
    if (u.startsWith('/api/chat')) {
      const reply = "This is the display deck, Chief — my full core runs on the local rig at localhost:3000, where the vault, models, and memory live. Up here I hold the Ring and look good doing it. Boot the local core and we'll finish the fight.";
      return Promise.resolve(new Response(JSON.stringify({ reply, sources: [] }), { status: 200, headers: { 'Content-Type': 'application/json' } }));
    }
    return Promise.reject(new Error('Cortana core offline — static display mode'));
  };
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   J.A.R.V.I.S ORB — a solid, physically-lit 3D sphere.
   Core: opaque plasma surface with diffuse + specular lighting
   and a fresnel rim. Atmosphere: additive glow shell. The
   surface ripples with speech cadence so the orb visibly talks.
   Iron Man palette: arc-reactor blue / gold / hot-rod red.
   ============================================================ */
let scene, camera, renderer, orbCore = null, orbAtmo = null;
let vaultGraph = null, filePoints = null, dirPoints = null;
let fileNodes = [], dirNodes = [], hoveredNode = null;
const GRAPH_SPIN = { idle: 0.0012, listening: 0.0026, thinking: 0.006, speaking: 0.0038 };
const ORB_Y = 0.55; // orb sits above the chat area
let currentState = 'idle';
let targetScale = 1.0, currentScale = 1.0;
let currentAudio_lvl = 0.12;
let speakingCadence = { intensity: 0, nextChange: 0 };

const states = {
  idle: {
    core: 0x0a4d2a, energy: 0x4bffa8, glow: 0x35ff9d,
    audioLevel: 0.12, timeSpeed: 0.012, spin: 0.0016,
    pulsateMode: 'breathe', pulsateMin: 0.0, pulsateMax: 0.04, description: 'Online',
  },
  listening: {
    core: 0x7d3410, energy: 0xffe27a, glow: 0xffc42e,
    audioLevel: 0.45, timeSpeed: 0.02, spin: 0.003,
    pulsateMode: 'cadence', pulsateMin: 0.02, pulsateMax: 0.14, description: 'Listening',
  },
  thinking: {
    core: 0x5c4305, energy: 0xffc42e, glow: 0xffe14d,
    audioLevel: 0.4, timeSpeed: 0.022, spin: 0.006,
    pulsateMode: 'thinking', pulsateMin: 0.0, pulsateMax: 0.11, description: 'Processing',
  },
  speaking: {
    core: 0x0a3d22, energy: 0x54ffb0, glow: 0x8cffc8,
    audioLevel: 0.9, timeSpeed: 0.026, spin: 0.004,
    pulsateMode: 'cadence', pulsateMin: 0.03, pulsateMax: 0.16, description: 'Speaking',
  },
};

/* Simplex noise — declared once, shared by both shaders */
const noiseGLSL = `
  vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
  vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
  vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
  float snoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x); vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z); vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }
`;

const coreVertexShader = noiseGLSL + `
  varying vec3 vNormal; varying vec3 vViewPos; varying vec3 vObjPos;
  uniform float time; uniform float audioLevel;
  void main() {
    vec3 pos = position;
    // Speech ripples: low-frequency swell + high-frequency chatter, both
    // scaled by audioLevel so the surface visibly moves when Jarvis talks
    float swell = snoise(position * 1.6 + time * 0.4) * 0.02;
    float chatter = snoise(position * 5.0 + time * 2.2) * 0.03;
    float distortion = (swell + chatter * audioLevel) * (0.25 + audioLevel * 1.1);
    pos += normal * distortion;
    vObjPos = pos;
    vNormal = normalize(normalMatrix * normal);
    vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
    vViewPos = mvPos.xyz;
    gl_Position = projectionMatrix * mvPos;
  }
`;

const coreFragmentShader = noiseGLSL + `
  varying vec3 vNormal; varying vec3 vViewPos; varying vec3 vObjPos;
  uniform vec3 coreColor; uniform vec3 energyColor; uniform vec3 glowColor;
  uniform float time; uniform float audioLevel;
  void main() {
    vec3 N = normalize(vNormal);
    vec3 V = normalize(-vViewPos);

    // Swirling plasma surface — 3-octave fbm drifting over the sphere
    vec3 q = vObjPos * 2.6 + vec3(0.0, -time * 0.12, 0.0);
    float n = snoise(q + time * 0.18) * 0.5
            + snoise(q * 2.1 - time * 0.11) * 0.25
            + snoise(q * 4.3 + time * 0.26) * 0.125;
    n = n * 0.57 + 0.5;
    float bands = smoothstep(0.42, 0.78, n);
    vec3 surface = mix(coreColor * 0.4, coreColor * 1.25, n)
                 + energyColor * bands * bands * (0.35 + audioLevel * 0.9);

    // Key + fill lights (view space) with Blinn-Phong specular — this is
    // what makes it read as a solid sphere instead of a flat disc
    vec3 L1 = normalize(vec3(0.55, 0.75, 0.55));
    vec3 L2 = normalize(vec3(-0.6, -0.25, 0.4));
    float diff = max(dot(N, L1), 0.0) * 0.9 + max(dot(N, L2), 0.0) * 0.25 + 0.18;
    vec3 H = normalize(L1 + V);
    float spec = pow(max(dot(N, H), 0.0), 70.0);

    // Fresnel rim — arc-reactor edge light
    float fres = pow(1.0 - max(dot(N, V), 0.0), 2.6);

    vec3 color = surface * diff
               + vec3(1.0, 0.98, 0.92) * spec * 0.6
               + glowColor * fres * (0.7 + audioLevel * 0.5);
    // Semi-transparent shell: the vault constellation inside stays readable
    gl_FragColor = vec4(color, 0.55 + fres * 0.4);
  }
`;

const atmoVertexShader = `
  varying vec3 vNormal; varying vec3 vViewPos;
  void main() {
    vNormal = normalize(normalMatrix * normal);
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    vViewPos = mvPos.xyz;
    gl_Position = projectionMatrix * mvPos;
  }
`;

const atmoFragmentShader = `
  varying vec3 vNormal; varying vec3 vViewPos;
  uniform vec3 glowColor; uniform float audioLevel;
  void main() {
    vec3 N = normalize(vNormal);
    vec3 V = normalize(-vViewPos);
    float fres = pow(1.0 - abs(dot(N, V)), 3.0);
    gl_FragColor = vec4(glowColor, fres * (0.45 + audioLevel * 0.35));
  }
`;

function initOrb() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 3.0; // zoomed in tight on the sphere so the vault brain reads clearly
  const canvas = document.getElementById('orbCanvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const s0 = states.idle;
  orbCore = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 128, 128),
    new THREE.ShaderMaterial({
      vertexShader: coreVertexShader, fragmentShader: coreFragmentShader,
      uniforms: {
        time: { value: 0 },
        audioLevel: { value: s0.audioLevel },
        coreColor: { value: new THREE.Color(s0.core) },
        energyColor: { value: new THREE.Color(s0.energy) },
        glowColor: { value: new THREE.Color(s0.glow) },
      },
      transparent: true, depthWrite: false,
    })
  );
  orbCore.position.y = ORB_Y;
  scene.add(orbCore);

  orbAtmo = new THREE.Mesh(
    new THREE.SphereGeometry(0.82, 64, 64),
    new THREE.ShaderMaterial({
      vertexShader: atmoVertexShader, fragmentShader: atmoFragmentShader,
      uniforms: {
        glowColor: { value: new THREE.Color(s0.glow) },
        audioLevel: { value: s0.audioLevel },
      },
      transparent: true, side: THREE.BackSide,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  orbAtmo.position.y = ORB_Y;
  scene.add(orbAtmo);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  animate();
}

/* ============================================================
   VAULT GRAPH — the vault rendered as a miniature Obsidian-style
   constellation INSIDE the orb: gold hubs = folders, blue points
   = files, threads = structure. Hover to read a node, click a
   file to open it, click a folder to open the vault drawer.
   ============================================================ */
async function initVaultGraph() {
  let tree;
  try {
    const res = await fetch('/api/vault/tree');
    tree = (await res.json()).tree || [];
  } catch (_) { return; } // vault offline — orb just stays as-is
  const MAX_NODES = 220, MAX_FILES_PER_DIR = 8;
  const filePos = [], dirPos = [], linePos = [];
  fileNodes = []; dirNodes = [];
  let count = 0;

  const pushLine = (a, b) => { linePos.push(a.x, a.y, a.z, b.x, b.y, b.z); };
  const randDir = () => new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();

  // Root hub at the orb's core
  const root = new THREE.Vector3(0, 0, 0);
  dirPos.push(0, 0, 0);
  dirNodes.push({ path: '', name: 'FGA-Brain', type: 'dir' });

  function place(nodes, center, radius, depth) {
    const dirs = nodes.filter((n) => n.type === 'dir');
    const files = nodes.filter((n) => n.type === 'file').slice(0, MAX_FILES_PER_DIR);
    const all = dirs.concat(files);
    all.forEach((node, i) => {
      if (count >= MAX_NODES) return;
      count++;
      // Even ring distribution at top level (golden angle), looser when nested
      let dir;
      if (depth === 0) {
        const phi = i * 2.39996; // golden angle
        const y = ((i / Math.max(1, all.length - 1)) - 0.5) * 1.6;
        dir = new THREE.Vector3(Math.cos(phi), y, Math.sin(phi)).normalize();
      } else {
        dir = randDir();
      }
      const pos = center.clone().add(dir.multiplyScalar(radius * (0.75 + Math.random() * 0.5)));
      pos.clampLength(0, 0.56); // stay inside the innermost orb shell
      pushLine(center, pos);
      if (node.type === 'dir') {
        dirPos.push(pos.x, pos.y, pos.z);
        dirNodes.push({ path: node.path, name: node.name, type: 'dir' });
        if (depth < 2 && node.children && node.children.length) {
          place(node.children, pos, radius * 0.45, depth + 1);
        }
      } else {
        filePos.push(pos.x, pos.y, pos.z);
        fileNodes.push({ path: node.path, name: node.name, type: 'file' });
      }
    });
  }
  place(tree, root, 0.34, 0);

  vaultGraph = new THREE.Group();
  const mkGeo = (arr) => {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(arr, 3));
    return g;
  };
  // Circular orb sprite — solid bright core with a soft glow falloff, so
  // nodes read as round Obsidian-style orbs instead of square GL points
  const orbSprite = (() => {
    const c = document.createElement('canvas');
    c.width = c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    g.addColorStop(0.0, 'rgba(255,255,255,1)');
    g.addColorStop(0.28, 'rgba(255,255,255,1)');
    g.addColorStop(0.42, 'rgba(255,255,255,0.55)');
    g.addColorStop(0.7, 'rgba(255,255,255,0.12)');
    g.addColorStop(1.0, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 128, 128);
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  })();
  // depthTest off: the constellation shines through the solid core like a
  // hologram projected inside it
  const lines = new THREE.LineSegments(mkGeo(linePos), new THREE.LineBasicMaterial({
    color: 0x46ffa4, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending,
    depthWrite: false, depthTest: false,
  }));
  filePoints = new THREE.Points(mkGeo(filePos), new THREE.PointsMaterial({
    color: 0xffe9a8, size: 0.055, map: orbSprite, sizeAttenuation: true, transparent: true, opacity: 0.95,
    blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false,
  }));
  dirPoints = new THREE.Points(mkGeo(dirPos), new THREE.PointsMaterial({
    color: 0xffc42e, size: 0.1, map: orbSprite, sizeAttenuation: true, transparent: true, opacity: 1.0,
    blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false,
  }));
  vaultGraph.add(lines, filePoints, dirPoints);
  vaultGraph.position.y = ORB_Y;
  vaultGraph.renderOrder = 10;
  scene.add(vaultGraph);
}

/* Reach into the orb: hover a data point to identify it, click to open */
const nodeTip = document.getElementById('nodeTip');
const graphRaycaster = new THREE.Raycaster();
graphRaycaster.params.Points = { threshold: 0.05 };
const pointerNDC = new THREE.Vector2();

function pickGraphNode(e) {
  if (!vaultGraph || window.jarvisGalaxyActive) return null;
  pointerNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointerNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
  graphRaycaster.setFromCamera(pointerNDC, camera);
  const hits = graphRaycaster.intersectObjects([dirPoints, filePoints]);
  if (!hits.length) return null;
  const hit = hits[0];
  return hit.object === dirPoints ? dirNodes[hit.index] : fileNodes[hit.index];
}

function overUI(e) {
  return !!(e.target.closest && e.target.closest('button, #vault, #sysPanel, #filePreview, #chatWrap, #opsDock, header, .holoCard, #nodeTip'));
}

window.addEventListener('mousemove', (e) => {
  if (overUI(e)) { hoveredNode = null; nodeTip.style.display = 'none'; document.body.style.cursor = ''; return; }
  hoveredNode = pickGraphNode(e);
  if (hoveredNode) {
    nodeTip.innerHTML = '<span class="ntype">' + (hoveredNode.type === 'dir' ? '◈ folder' : '◦ file') + '</span>' +
      hoveredNode.name.replace(/</g, '&lt;');
    nodeTip.className = hoveredNode.type;
    nodeTip.style.display = 'block';
    nodeTip.style.left = Math.min(e.clientX + 14, window.innerWidth - 240) + 'px';
    nodeTip.style.top = (e.clientY - 28) + 'px';
    document.body.style.cursor = 'pointer';
  } else {
    nodeTip.style.display = 'none';
    document.body.style.cursor = '';
  }
});

window.addEventListener('click', (e) => {
  if (overUI(e) || !hoveredNode) return;
  if (hoveredNode.type === 'file') {
    openFile(hoveredNode.path);
  } else {
    // Folder → open the vault drawer for the full tree
    const v = document.getElementById('vault');
    if (!v.classList.contains('open')) document.getElementById('vaultToggle').click();
  }
});

function setState(name) {
  if (!states[name]) return;
  currentState = name;
  const state = states[name];
  const status = document.getElementById('orbStatus');
  status.textContent = state.description;
  status.className = name === 'thinking' ? 'thinking' : (name === 'speaking' ? 'speaking' : '');
  if (orbCore) {
    orbCore.material.uniforms.coreColor.value.setHex(state.core);
    orbCore.material.uniforms.energyColor.value.setHex(state.energy);
    orbCore.material.uniforms.glowColor.value.setHex(state.glow);
    orbAtmo.material.uniforms.glowColor.value.setHex(state.glow);
  }
}

function updateCadence() {
  const now = Date.now() * 0.001;
  if (now >= speakingCadence.nextChange) {
    const r = Math.random();
    if (r < 0.3) { speakingCadence.intensity = 0.7 + Math.random() * 0.3; speakingCadence.nextChange = now + 0.15 + Math.random() * 0.15; }
    else if (r < 0.6) { speakingCadence.intensity = 0.5 + Math.random() * 0.4; speakingCadence.nextChange = now + 0.3 + Math.random() * 0.3; }
    else if (r < 0.85) { speakingCadence.intensity = 0.6 + Math.random() * 0.4; speakingCadence.nextChange = now + 0.5 + Math.random() * 0.4; }
    else { speakingCadence.intensity = 0.1 + Math.random() * 0.2; speakingCadence.nextChange = now + 0.2 + Math.random() * 0.3; }
  }
  return Math.max(0, speakingCadence.intensity + Math.sin(Date.now() * 0.01) * 0.08);
}

function animate() {
  requestAnimationFrame(animate);
  const state = states[currentState];
  const t = Date.now() * 0.001;
  let cadence = 0.5;
  if (state.pulsateMode === 'thinking') {
    const pulse = (Math.sin(t * 1.8) + 1.0) / 2.0;
    targetScale = 1.0 + state.pulsateMin + pulse * (state.pulsateMax - state.pulsateMin);
  } else if (state.pulsateMode === 'cadence') {
    cadence = updateCadence();
    targetScale = 1.0 + state.pulsateMin + cadence * (state.pulsateMax - state.pulsateMin);
  } else { // breathe
    const pulse = (Math.sin(t * 0.8) + 1.0) / 2.0;
    targetScale = 1.0 + state.pulsateMin + pulse * (state.pulsateMax - state.pulsateMin);
  }
  currentScale += (targetScale - currentScale) * 0.15;

  // Audio level eases toward the state target, modulated by speech cadence
  // so surface ripples follow the rhythm of Jarvis's voice
  const targetAudio = state.audioLevel * (state.pulsateMode === 'cadence' ? 0.45 + cadence * 0.75 : 1.0);
  currentAudio_lvl += (targetAudio - currentAudio_lvl) * 0.12;

  const bobY = ORB_Y + Math.sin(Date.now() * 0.0007) * 0.07;
  if (orbCore) {
    orbCore.material.uniforms.time.value += state.timeSpeed;
    orbCore.material.uniforms.audioLevel.value = currentAudio_lvl;
    orbAtmo.material.uniforms.audioLevel.value = currentAudio_lvl;
    orbCore.rotation.y += state.spin;
    orbCore.scale.setScalar(currentScale);
    orbAtmo.scale.setScalar(currentScale);
    // Projector hologram: the whole orb bobs gently in the beam
    orbCore.position.y = bobY;
    orbAtmo.position.y = bobY;
  }
  if (vaultGraph) {
    vaultGraph.rotation.y += GRAPH_SPIN[currentState] || 0.0012;
    vaultGraph.position.y = bobY;
    vaultGraph.scale.setScalar(currentScale);
  }
  if (window.jarvisGalaxyTick) window.jarvisGalaxyTick();
  renderer.render(scene, camera);
}

/* ============================================================
   CHAT + VAULT + VOICE
   ============================================================ */
const log = document.getElementById('log');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const contextChips = document.getElementById('contextChips');
let contextFiles = []; // vault paths attached to conversation
let ttsEnabled = localStorage.getItem('jarvis-tts') !== 'off';

/* ===== Model switchboard state ===== */
let selectedModel = localStorage.getItem('jarvis-model') || 'auto';
let selectedEffort = localStorage.getItem('jarvis-effort') || 'auto';
let switchboard = null; // /api/models payload
const MODEL_SHORT = { claude: 'Claude', haiku: 'Haiku', fable: 'Fable', openai: 'GPT', grok: 'Grok', perplexity: 'PPLX' };
const EFFORT_SHORT = { low: 'Low', medium: 'Med', high: 'High', xhigh: 'X-Hi', max: 'Max' };

async function buildSwitchboard() {

    const res = await fetch('/api/models');
    switchboard = await res.json();

function persistSwitch() {

function renderPills() {
  const mWrap = document.getElementById('modelPills');
  const eWrap = document.getElementById('effortPills');
  mWrap.innerHTML = ''; eWrap.innerHTML = '';
  const mk = (cls, label, title) => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = cls; b.textContent = label; b.title = title || '';
    return b;
  };
  // Model pills

    b.addEventListener('click', () => { selectedEffort = ef; persistSwitch(); });
    eWrap.appendChild(b);
  }
}

function addMsg(text, who, routing) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  if (who === 'jarvis' && routing && routing.label) {
    const tag = document.createElement('span');
    tag.className = 'routeTag';
    tag.textContent = '◈ ' + routing.label + (routing.effort ? ' · ' + routing.effort : '');
    if (routing.reason) {
      const rr = document.createElement('span');
      rr.className = 'rr';
      rr.textContent = '  — ' + routing.reason;
      tag.appendChild(rr);
    }
    div.appendChild(tag);
    div.appendChild(document.createTextNode(text));
  } else {
    div.textContent = text;
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

let currentAudio = null;
function restState() { return (typeof convoMode !== 'undefined' && convoMode) ? 'listening' : 'idle'; }
function doneSpeaking() { setState(restState()); resumeMic(); }
async function speak(text) {
  if (!ttsEnabled) { doneSpeaking(); return; }
  pauseMic(); // mic is dead while Jarvis talks so he never hears himself
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  // ElevenLabs (Adam Stone) via server; fall back to browser TTS if unavailable
  try {
    const r = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!r.ok) throw new Error('TTS ' + r.status);
    const blob = await r.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    currentAudio = audio;
    audio.onended = () => { URL.revokeObjectURL(audio.src); currentAudio = null; doneSpeaking(); };
    audio.onerror = () => { currentAudio = null; doneSpeaking(); };
    await audio.play();
    return;
  } catch (err) {
    console.warn('ElevenLabs TTS unavailable, using browser voice:', err.message);
  }
  if (!window.speechSynthesis) { doneSpeaking(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.02; u.pitch = 0.95;
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => /Daniel|Oliver|Serena|Samantha|Google UK English Male/i.test(v.name));
  if (preferred) u.voice = preferred;
  u.onend = () => doneSpeaking();
  u.onerror = () => doneSpeaking();
  speechSynthesis.speak(u);
}

async function sendMessage(text) {
  text = (text || '').trim();
  if (!text) return;
  if (/^remember\s+that\b/i.test(text) && window.jarvisRemember) {
    window.jarvisRemember(text);
    return;
  }
  addMsg(text, 'thomas');
  input.value = ''; input.style.height = 'auto';
  sendBtn.disabled = true;
  setState('thinking');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, contextFiles, model: selectedModel, effort: selectedEffort }),
    });
    const raw = await res.text();
    if (!res.ok) throw new Error(raw || res.statusText);
    const data = JSON.parse(raw);
    setState('speaking');
    addMsg(data.reply, 'jarvis', data.routing);
    if (window.jarvisTraceSources) window.jarvisTraceSources(data.sources || []);
    speak(data.reply);
    if (!ttsEnabled) setTimeout(() => { if (currentState === 'speaking') setState(restState()); }, Math.min(6000, 1500 + data.reply.length * 15));
  } catch (err) {
    addMsg('⚠ ' + err.message, 'system');
    doneSpeaking();
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

/* Mic — continuous conversation mode.
   Click once: mic stays live. Speak → Jarvis answers → mic resumes listening.
   While Jarvis is thinking or speaking, recognition is fully paused (aborted)
   so he can never hear his own voice. Click again to end the conversation. */
const micBtn = document.getElementById('mic');
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) micBtn.style.display = 'none';
let convoMode = false, recognition = null, micPaused = false;
let silenceTimer = null, utteranceBuf = '', lastInterim = '';

/* End-of-utterance detection: how long to wait after you stop talking.
   Looks-finished speech sends fast; mid-thought speech gets more room. */
const SILENCE_DONE_MS = 1600;   // ends with . ? ! or a complete-sounding phrase
const SILENCE_MIDTHOUGHT_MS = 4000; // trailing "and/but/so/um..." or very short fragment
const MIDTHOUGHT_TAIL = /\b(and|but|so|or|because|then|also|like|um+|uh+|the|a|an|to|for|with|if|when|that|is|are|was|i|we|it's|i'm)\s*$/i;

function silenceDelayFor(text) {
  const t = text.trim();
  if (/[.?!]\s*$/.test(t)) return SILENCE_DONE_MS;          // clearly finished
  if (MIDTHOUGHT_TAIL.test(t)) return SILENCE_MIDTHOUGHT_MS; // clearly mid-thought
  if (t.split(/\s+/).length <= 2) return SILENCE_MIDTHOUGHT_MS; // tiny fragment — wait
  return 2500; // no punctuation (Chrome usually gives none) — middle ground
}

function stopSpeaking() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function pauseMic() {
  micPaused = true;
  clearTimeout(silenceTimer); silenceTimer = null; utteranceBuf = ''; lastInterim = '';
  if (recognition) { try { recognition.abort(); } catch (_) {} }
}

function resumeMic() {
  if (!convoMode) return;
  micPaused = false;
  startRecognition();
}

function sendUtterance(text) {
  text = (text || '').trim();
  if (!text) return;
  clearTimeout(silenceTimer); silenceTimer = null; utteranceBuf = ''; lastInterim = '';
  input.value = '';
  pauseMic(); // stop listening the moment a request is in flight
  sendMessage(text);
}

function armSilenceTimer() {
  const full = (utteranceBuf + ' ' + lastInterim).trim();
  if (!full) return;
  input.value = full;
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => {
    const text = (utteranceBuf + ' ' + lastInterim).trim();
    if (!micPaused && text) sendUtterance(text);
  }, silenceDelayFor(full));
}

function startRecognition() {
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onstart = () => {
    micBtn.classList.add('listening');
    if (currentState === 'idle') setState('listening');
  };
  recognition.onresult = (e) => {
    let interim = '', finals = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finals += t; else interim += t;
    }
    // Finals no longer send immediately — they accumulate in the buffer so a
    // short pause doesn't cut you off. The silence timer decides when you're done.
    // Some browsers re-deliver the same final after a recognition restart —
    // skip a final that's already the tail of the buffer so words appear once.
    const f = finals.trim();
    if (f && !utteranceBuf.toLowerCase().endsWith(f.toLowerCase())) {
      utteranceBuf = (utteranceBuf + ' ' + f).trim(); lastInterim = '';
    } else if (f) { lastInterim = ''; }
    if (interim.trim()) lastInterim = interim.trim();
    armSilenceTimer();
  };
  recognition.onend = () => {
    // Chrome kills continuous recognition periodically — restart while live,
    // but stay quiet while paused (Jarvis thinking/speaking)
    if (convoMode && !micPaused) { try { recognition.start(); } catch (_) { setTimeout(() => convoMode && !micPaused && startRecognition(), 300); } }
    else if (!convoMode) { micBtn.classList.remove('listening'); if (currentState === 'listening') setState('idle'); }
  };
  recognition.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      convoMode = false;
      micBtn.classList.remove('listening');
      addMsg('⚠ Mic access blocked — allow microphone for localhost:3000', 'system');
      setState('idle');
    }
    // other errors (no-speech, aborted, network) → onend fires and restarts
  };
  try { recognition.start(); } catch (_) {}
}

micBtn.addEventListener('click', () => {
  if (convoMode) {
    convoMode = false;
    micPaused = false;
    clearTimeout(silenceTimer); silenceTimer = null; utteranceBuf = ''; lastInterim = '';
    if (recognition) { try { recognition.abort(); } catch (_) {} }
    stopSpeaking();
    micBtn.classList.remove('listening');
    setState('idle');
  } else {
    convoMode = true;
    startRecognition();
  }
});

/* Vault browser */
const vault = document.getElementById('vault');
document.getElementById('vaultToggle').addEventListener('click', async () => {
  vault.classList.toggle('open');
  if (vault.classList.contains('open')) sysPanel.classList.remove('open');
  if (vault.classList.contains('open') && !vault.dataset.loaded) {
    try {
      const res = await fetch('/api/vault/tree');
      const data = await res.json();
      const tree = document.getElementById('vaultTree');
      tree.innerHTML = '';
      renderTree(data.tree, tree);
      vault.dataset.loaded = '1';
    } catch (err) {
      document.getElementById('vaultTree').innerHTML = '<div class="msg system">Failed to load vault</div>';
    }
  }
});

function renderTree(nodes, container) {
  for (const node of nodes) {
    const wrap = document.createElement('div');
    wrap.className = 'tnode';
    const row = document.createElement('div');
    row.className = 'trow ' + node.type;
    const glyph = document.createElement('span');
    glyph.className = 'glyph';
    glyph.textContent = node.type === 'dir' ? '▸' : '◦';
    row.appendChild(glyph);
    row.appendChild(document.createTextNode(node.name));
    wrap.appendChild(row);
    if (node.type === 'dir') {
      const kids = document.createElement('div');
      kids.className = 'tchildren';
      renderTree(node.children || [], kids);
      wrap.appendChild(kids);
      row.addEventListener('click', () => {
        wrap.classList.toggle('open');
        glyph.textContent = wrap.classList.contains('open') ? '▾' : '▸';
      });
    } else {
      row.addEventListener('click', () => openFile(node.path));
    }
    container.appendChild(wrap);
  }
}

const filePreview = document.getElementById('filePreview');
let previewPath = null;
async function openFile(relPath) {
  try {
    const res = await fetch('/api/vault/file?path=' + encodeURIComponent(relPath));
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    previewPath = relPath;
    document.getElementById('fileName').textContent = relPath + (data.truncated ? ' (truncated)' : '');
    document.getElementById('fileBody').textContent = data.content;
    filePreview.classList.add('open');
  } catch (err) {
    addMsg('⚠ Could not open ' + relPath + ': ' + err.message, 'system');
  }
}
document.getElementById('fileClose').addEventListener('click', () => filePreview.classList.remove('open'));
document.getElementById('fileAttach').addEventListener('click', () => {
  if (previewPath && !contextFiles.includes(previewPath)) {
    contextFiles.push(previewPath);
    renderChips();
  }
  filePreview.classList.remove('open');
});

function renderChips() {
  contextChips.innerHTML = '';
  for (const p of contextFiles) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.innerHTML = '◈ ' + p.split('/').pop() + ' <span class="x">✕</span>';
    chip.title = p + ' — click to remove from Cortana context';
    chip.addEventListener('click', () => {
      contextFiles = contextFiles.filter(f => f !== p);
      renderChips();
    });
    contextChips.appendChild(chip);
  }
}

/* ===== Floating vault files — Obsidian holograms in the background ===== */
async function buildHoloField() {
  if (window.innerWidth <= 720) return; // hidden on mobile (CSS backs this up)
  const field = document.getElementById('holoField');
  try {
    const res = await fetch('/api/vault/tree');
    const data = await res.json();
    const files = [];
    (function flatten(nodes) {
      for (const n of nodes) {
        if (n.type === 'file' && /\.md$/i.test(n.name)) files.push(n.path);
        if (n.children) flatten(n.children);
      }
    })(data.tree || []);
    const wiki = files.filter((p) => p.startsWith('wiki'));
    const pool = (wiki.length >= 8 ? wiki : files).sort(() => Math.random() - 0.5).slice(0, 8);
    // Side lanes only — the orb, beam, and chat own the center.
    // Each card gets its own vertical slot so text never overlaps text.
    const lanes = [[2, 24], [72, 96]];
    pool.forEach(async (p, i) => {
      const card = document.createElement('div');
      card.className = 'holoCard';
      const lane = lanes[i % 2];
      const slot = Math.floor(i / 2); // 0..3 per lane
      const depth = 0.55 + Math.random() * 0.45; // 1 = near, .55 = far
      card.style.left = (lane[0] + Math.random() * (lane[1] - lane[0] - 16)) + '%';
      card.style.top = (5 + slot * 16 + Math.random() * 2) + '%';
      card.style.width = Math.round(140 + depth * 90) + 'px';
      card.style.setProperty('--op', (0.2 + depth * 0.32).toFixed(2));
      card.style.setProperty('--dur', (11 + Math.random() * 10).toFixed(1) + 's');
      card.style.setProperty('--y1', -(8 + Math.random() * 20).toFixed(0) + 'px');
      card.style.setProperty('--r1', ((Math.random() - 0.5) * 1.4).toFixed(2) + 'deg');
      if (depth < 0.72) card.style.filter = 'blur(0.6px)';
      const name = document.createElement('div');
      name.className = 'hname';
      name.textContent = p.split('/').pop().replace(/\.md$/i, '');
      const body = document.createElement('div');
      body.className = 'hbody';
      body.textContent = '…';
      card.appendChild(name);
      card.appendChild(body);
      card.title = p;
      card.addEventListener('click', () => openFile(p));
      field.appendChild(card);
      try {
        const fr = await fetch('/api/vault/file?path=' + encodeURIComponent(p));
        const fd = await fr.json();
        body.textContent = (fd.content || '')
          .replace(/^---[\s\S]*?---\s*/, '')      // strip frontmatter
          .replace(/[#>*`\[\]|]/g, '')             // strip md noise
          .trim().slice(0, 220);
      } catch (_) { /* keep placeholder */ }
    });
  } catch (_) { /* vault offline — background stays clean */ }
}
